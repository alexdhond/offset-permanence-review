name: Notify website rebuild

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch event to alexdhond.github.io
        env:
          WEBSITE_DISPATCH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$WEBSITE_DISPATCH_TOKEN" ]; then
            echo "Missing secret WEBSITE_DISPATCH_TOKEN" >&2
            exit 1
          fi

          API_URL="https://api.github.com/repos/alexdhond/alexdhond.github.io/dispatches"

          # For pushes: GITHUB_REF_NAME is the branch name (e.g. main)
          # For releases: GITHUB_REF_NAME is the tag name
          REF_NAME="${GITHUB_REF_NAME}"

          curl -sSf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${WEBSITE_DISPATCH_TOKEN}" \
            "${API_URL}" \
            -d '{
              "event_type": "external-source-updated",
              "client_payload": {
                "source_repo": "alexdhond/offset-permanence-review",
                "ref": "'"${REF_NAME}"'",
                "sha": "'"${GITHUB_SHA}"'"
              }
            }'
